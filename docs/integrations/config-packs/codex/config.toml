# Copy into ~/.codex/config.toml or .codex/config.toml.
# Requires: python -m pip install -e "C:\path\to\creativity-layer"

[mcp_servers.creativity-layer]
command = "creativity-layer-mcp"
args = []
enabled = true
enabled_tools = ["creative_plan"]
startup_timeout_sec = 10
tool_timeout_sec = 120

# Optional live OpenAI environment. Uncomment in a local-only config.
# [mcp_servers.creativity-layer.env]
# OPENAI_API_KEY = "${OPENAI_API_KEY}"
# OPENAI_ECONOMY_MODEL = "${OPENAI_ECONOMY_MODEL}"
# OPENAI_STRONG_MODEL = "${OPENAI_STRONG_MODEL}"
# OPENAI_EMBEDDING_MODEL = "text-embedding-3-small"
# OPENAI_PRICING_FILE = "${OPENAI_PRICING_FILE}"
